<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 sticky top-0 z-50 flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" alt="github-logo" class="h-8 w-auto">
            <span class="text-xl font-bold text-black">GitHub Issues Tracker</span>
        </div>
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" placeholder="Search issues..." 
                    class="w-80 border border-gray-200 rounded-md py-2 pl-9 text-sm">
                <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
            </div>
            <button class="bg-[#4A00FF] hover:bg-[#4A00D6] text-white px-4 py-2 rounded-md font-medium text-sm">
                + New Issue
            </button>
        </div>
    </nav>
